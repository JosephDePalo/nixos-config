# Set prefix to Ctrl-a (optional — Vim users often prefer this over Ctrl-b)
set -g prefix M-a
unbind C-b
bind M-a send-prefix

# Make pane splitting easier (Alt + | or Alt + -)
bind -n M-- split-window -v    # Alt + - splits vertically (top/bottom)
bind -n M-| split-window -h    # Alt + \ splits horizontally (side-by-side)

bind -n M-x kill-pane

# Navigate panes using Alt + h/j/k/l (Vim-style)
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Resize panes with Alt + Shift + h/j/k/l
bind -n M-H resize-pane -L 5
bind -n M-J resize-pane -D 5
bind -n M-K resize-pane -U 5
bind -n M-L resize-pane -R 5

# Quickly create a new window with Alt + n
bind -n M-n new-window

# Rename a window with Prefix + r
bind r command-prompt "rename-window %%"

# Switch between windows with Alt + [ and Alt + ]
bind -n M-[ previous-window
bind -n M-] next-window

# Enable mouse support (click to select panes, resize, etc.)
set -g mouse on

# Aesthetics (optional)
set -g status-bg colour235
set -g status-fg white
set -g pane-border-style fg=colour240
set -g pane-active-border-style fg=cyan
# set -g status-right '#{mpd_now_playing} | #{battery_icon} #{battery_percentage} | %a %h-%d %H:%M '
# set -g status-right-length 100
# set -g @tmux2k-theme 'gruvbox'

# Switch Windows
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9
bind -n M-0 select-window -t 0

set -g base-index 1

set -g allow-passthrough on

set -g renumber-windows on

# optional: ensures standard image deletion escape codes work
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

